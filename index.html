<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>원랜디 도감</title>
<meta name="theme-color" content="#1b2a3a">
<meta name="description" content="원피스 랜덤 디펜스 조합 도감 - 캐릭터 검색 및 조합 역추적">

<!-- PWA: manifest -->
<link rel="manifest" href="./manifest.json">

<!-- PWA: icons -->
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">
<link rel="shortcut icon" href="./favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">

<!-- PWA: iOS standalone support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="원랜디 도감">

<!-- PWA: Android / general -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="원랜디 도감">

<style>
  :root{
    --ink:#1b2a3a;
    --ink-soft:#2c4258;
    --parchment:#f3e9d2;
    --parchment-dark:#e3d4ad;
    --gold:#c8a052;
    --gold-bright:#e0b863;
    --rope:#8a6a3c;
    --rust:#a8462f;
    --sea:#173f52;
    --sea-deep:#0e2733;
    --ok-green:#3f7a52;
    --text-dim:#6b5d44;
    --font-display:'Black Han Sans', 'Noto Sans KR', sans-serif;
    --font-body:'Noto Sans KR', sans-serif;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    background:var(--sea-deep);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, rgba(232,200,140,0.08), transparent 60%),
      linear-gradient(180deg, var(--sea-deep), #0a1c24 60%, #08161c);
  }

  /* ===== Header ===== */
  header{
    position:sticky;
    top:0;
    z-index:30;
    background:linear-gradient(180deg, var(--sea) 0%, rgba(23,63,82,0.97) 100%);
    border-bottom:3px solid var(--gold);
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    padding:max(10px, env(safe-area-inset-top)) 16px 12px;
  }

  .header-inner{
    max-width:720px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .logo-mark{
    width:38px; height:38px;
    flex:none;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--rust) 75%);
    border-radius:50%;
    border:2px solid var(--parchment);
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
    font-size:18px;
  }

  h1{
    font-family:var(--font-display);
    font-size:21px;
    color:var(--parchment);
    letter-spacing:0.5px;
    text-shadow:0 2px 3px rgba(0,0,0,0.5);
    flex:1;
  }

  .count-badge{
    font-size:11px;
    color:var(--gold-bright);
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(200,160,82,0.4);
    border-radius:999px;
    padding:4px 10px;
    font-weight:600;
    white-space:nowrap;
  }

  /* ===== Search ===== */
  .search-wrap{
    max-width:720px;
    margin:10px auto 0;
    position:relative;
  }

  .search-input{
    width:100%;
    padding:12px 44px 12px 16px;
    border-radius:10px;
    border:2px solid var(--rope);
    background:var(--parchment);
    color:var(--ink);
    font-size:15px;
    font-family:var(--font-body);
    font-weight:500;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search-input::placeholder{ color:var(--text-dim); opacity:0.7; }
  .search-input:focus{
    border-color:var(--gold-bright);
    box-shadow:0 0 0 3px rgba(224,184,99,0.25);
  }

  .search-icon{
    position:absolute;
    right:14px; top:50%;
    transform:translateY(-50%);
    font-size:17px;
    opacity:0.55;
    pointer-events:none;
  }

  .hint-row{
    max-width:720px;
    margin:8px auto 0;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    font-size:11px;
  }
  .hint-chip{
    background:rgba(255,255,255,0.06);
    color:var(--gold-bright);
    border:1px solid rgba(200,160,82,0.3);
    border-radius:999px;
    padding:3px 9px;
  }

  /* ===== Grade Filter ===== */
  .grade-filter-row{
    max-width:720px;
    margin:10px auto 0;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .grade-chip{
    font-size:12px;
    font-weight:700;
    padding:5px 12px;
    border-radius:999px;
    border:1.5px solid rgba(243,233,210,0.25);
    color:rgba(243,233,210,0.7);
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    transition:all .12s;
  }
  .grade-chip.active{
    background:var(--gold);
    color:var(--ink);
    border-color:var(--gold);
  }
  .grade-chip.grade-anhun.active{ background:#7a8c98; border-color:#7a8c98; }
  .grade-chip.grade-teukbyul.active{ background:#c8862f; border-color:#c8862f; }
  .grade-chip.grade-huhn.active{ background:#5d8c5a; border-color:#5d8c5a; }
  .grade-chip.grade-huigwi.active{ background:#8e3a8c; border-color:#8e3a8c; }
  .grade-chip.grade-rare.active{ background:#a13d5e; border-color:#a13d5e; }
  .grade-chip.grade-legend.active{ background:#c0392b; border-color:#c0392b; }
  .grade-chip.grade-hidden.active{ background:#1f8a8c; border-color:#1f8a8c; }
  .grade-chip.grade-distortion.active{ background:#7b2fb5; border-color:#7b2fb5; color:#fdf2ff; }
  .grade-chip.grade-change.active{ background:#0e9488; border-color:#0e9488; color:#eafffb; }
  .grade-chip.grade-limited.active{ background:#d6336c; border-color:#d6336c; color:#fff0f5; }
  .grade-chip.grade-transcend.active{ background:#3b3f9e; border-color:#3b3f9e; color:#eef0ff; }
  .grade-chip.grade-immortal.active{ background:#b8860b; border-color:#b8860b; color:#fff8e6; }
  .grade-chip.grade-eternal.active{ background:#0d9276; border-color:#0d9276; color:#e9fff7; }

  /* 등급별 카드 좌측 보더 색상 */
  .card.grade-anhun{ border-left-color:#8a99a3; }
  .card.grade-teukbyul{ border-left-color:#d98c2e; }
  .card.grade-huhn{ border-left-color:#6fa46b; }
  .card.grade-huigwi{ border-left-color:#a652a3; }
  .card.grade-rare{ border-left-color:#c0507a; }
  .card.grade-legend{ border-left-color:#e74c3c; }
  .card.grade-hidden{ border-left-color:#2bb5b8; }
  .card.grade-distortion{ border-left-color:#9b2fc9; background:linear-gradient(160deg, var(--parchment) 0%, #e8d4f0 55%, var(--parchment-dark) 100%); }
  .card.grade-change{ border-left-color:#0e9488; background:linear-gradient(160deg, var(--parchment) 0%, #cdeee8 55%, var(--parchment-dark) 100%); }
  .card.grade-limited{ border-left-color:#d6336c; background:linear-gradient(160deg, var(--parchment) 0%, #f7d3e0 55%, var(--parchment-dark) 100%); }
  .card.grade-transcend{ border-left-color:#4c4fd6; background:linear-gradient(160deg, var(--parchment) 0%, #d6d8fb 55%, var(--parchment-dark) 100%); }
  .card.grade-immortal{ border-left-color:#b8860b; background:linear-gradient(160deg, var(--parchment) 0%, #f5e0a8 55%, var(--parchment-dark) 100%); }
  .card.grade-eternal{ border-left-color:#0d9276; background:linear-gradient(160deg, var(--parchment) 0%, #b8e8d8 50%, #f0e6c0 100%); }
  .card.grade-anhun .grade-tag{ background:#3f4d56; }
  .card.grade-teukbyul .grade-tag{ background:#7a4a14; color:#ffd9a0; }
  .card.grade-huhn .grade-tag{ background:#3a5a38; }
  .card.grade-huigwi .grade-tag{ background:#5e1f5c; color:#f0c4ee; }
  .card.grade-rare .grade-tag{ background:#6e2c45; }
  .card.grade-legend .grade-tag{ background:#7a1f15; color:#ffcfc7; }
  .card.grade-hidden .grade-tag{ background:#114e4f; color:#aef0ee; }
  .card.grade-distortion .grade-tag{ background:linear-gradient(135deg,#6b21a8,#c026a3); color:#fbe8ff; font-weight:700; }
  .card.grade-change .grade-tag{ background:#0b6b62; color:#d2fff5; font-weight:700; }
  .card.grade-limited .grade-tag{ background:linear-gradient(135deg,#a3174f,#e8487a); color:#ffe4ee; font-weight:700; }
  .card.grade-transcend .grade-tag{ background:linear-gradient(135deg,#2e2f8c,#6366f1); color:#e8e9ff; font-weight:700; }
  .card.grade-immortal .grade-tag{ background:linear-gradient(135deg,#8a5a00,#d4a017); color:#fff6dd; font-weight:700; }
  .card.grade-eternal .grade-tag{ background:linear-gradient(135deg,#04604a,#10b981,#d4a017); color:#eafff6; font-weight:700; }

  /* ===== Main / Grid ===== */
  main{
    max-width:720px;
    margin:0 auto;
    padding:14px 14px 90px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:rgba(243,233,210,0.55);
  }
  .empty-state .glyph{ font-size:40px; display:block; margin-bottom:10px; opacity:0.6;}
  .empty-state .sub{ font-size:13px; margin-top:6px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(1, 1fr);
    gap:10px;
  }
  @media (min-width:480px){
    .grid{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (min-width:680px){
    .grid{ grid-template-columns:repeat(3, 1fr); }
  }

  .card{
    background:linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border:1px solid var(--rope);
    border-left:4px solid var(--gold);
    border-radius:10px;
    padding:12px 12px 11px;
    cursor:pointer;
    position:relative;
    transition:transform .12s, box-shadow .12s;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
    min-height:108px;
    display:flex;
    flex-direction:column;
  }
  .card:active{ transform:scale(0.96); }

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:6px;
    margin-bottom:6px;
  }

  .grade-tag{
    background:var(--sea);
    color:var(--gold-bright);
    font-size:9px;
    font-weight:700;
    padding:2px 7px;
    border-radius:5px;
    letter-spacing:0.3px;
    white-space:nowrap;
    flex:none;
  }

  .card-name{
    font-size:14px;
    font-weight:800;
    color:var(--ink);
    line-height:1.3;
    flex:1;
  }

  .card-materials{
    font-size:11px;
    color:var(--text-dim);
    line-height:1.4;
    flex:1;
  }

  .card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    padding-top:6px;
    border-top:1px dashed rgba(138,106,60,0.35);
  }

  .card-level{
    font-size:10.5px;
    color:var(--text-dim);
    font-weight:700;
  }

  .card-tagcount{
    font-size:10px;
    color:var(--rust);
    font-weight:600;
  }

  /* ===== Modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(8,16,20,0.72);
    z-index:50;
    display:flex;
    align-items:flex-end;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }

  .modal-sheet{
    width:100%;
    max-width:720px;
    margin:0 auto;
    background:linear-gradient(165deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius:20px 20px 0 0;
    border-top:3px solid var(--gold);
    max-height:88vh;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform .25s cubic-bezier(.32,.72,0,1);
    padding-bottom:max(20px, env(safe-area-inset-bottom));
  }
  .modal-overlay.open .modal-sheet{ transform:translateY(0); }

  .modal-handle{
    width:40px; height:4px;
    background:var(--rope);
    border-radius:99px;
    margin:10px auto 4px;
    opacity:0.5;
  }

  .modal-header{
    display:flex;
    gap:14px;
    padding:16px 18px 10px;
    align-items:flex-start;
  }

  .modal-emblem{
    width:48px; height:48px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--rust) 80%);
    border:2px solid var(--parchment-dark);
    flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
  }

  .modal-title-area{ flex:1; min-width:0; padding-top:2px; }
  .modal-name{
    font-family:var(--font-display);
    font-size:19px;
    color:var(--ink);
    line-height:1.2;
  }
  .modal-grade{
    display:inline-block;
    margin-top:5px;
    background:var(--sea);
    color:var(--gold-bright);
    font-size:11px;
    font-weight:700;
    padding:3px 9px;
    border-radius:6px;
  }
  .modal-grade.grade-anhun{ background:#3f4d56; color:#cbd5db; }
  .modal-grade.grade-teukbyul{ background:#7a4a14; color:#ffd9a0; }
  .modal-grade.grade-huhn{ background:#3a5a38; color:#cfe8cc; }
  .modal-grade.grade-huigwi{ background:#5e1f5c; color:#f0c4ee; }
  .modal-grade.grade-rare{ background:#6e2c45; color:#f5cbdb; }
  .modal-grade.grade-legend{ background:#7a1f15; color:#ffcfc7; }
  .modal-grade.grade-hidden{ background:#114e4f; color:#aef0ee; }
  .modal-grade.grade-distortion{ background:linear-gradient(135deg,#6b21a8,#c026a3); color:#fbe8ff; font-weight:700; }
  .modal-grade.grade-change{ background:#0b6b62; color:#d2fff5; font-weight:700; }
  .modal-grade.grade-limited{ background:linear-gradient(135deg,#a3174f,#e8487a); color:#ffe4ee; font-weight:700; }
  .modal-grade.grade-transcend{ background:linear-gradient(135deg,#2e2f8c,#6366f1); color:#e8e9ff; font-weight:700; }
  .modal-grade.grade-immortal{ background:linear-gradient(135deg,#8a5a00,#d4a017); color:#fff6dd; font-weight:700; }
  .modal-grade.grade-eternal{ background:linear-gradient(135deg,#04604a,#10b981,#d4a017); color:#eafff6; font-weight:700; }
  .modal-level{
    margin-top:6px;
    font-size:12.5px;
    color:var(--text-dim);
    font-weight:600;
  }

  .close-btn{
    flex:none;
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(0,0,0,0.08);
    border:none;
    font-size:16px;
    color:var(--ink);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  .modal-section{
    padding:12px 18px;
    border-top:1px dashed rgba(138,106,60,0.4);
  }
  .section-label{
    font-size:11px;
    font-weight:700;
    color:var(--rust);
    letter-spacing:0.5px;
    margin-bottom:8px;
    display:flex; align-items:center; gap:5px;
  }

  .recipe-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .mini-chip{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.5);
    border:1px solid var(--rope);
    border-radius:8px;
    padding:6px 12px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s;
  }
  .mini-chip:active{ background:rgba(255,255,255,0.8); }
  .mini-chip.no-link{ cursor:default; }
  .plus-sep{ color:var(--text-dim); font-size:13px; font-weight:700; }
  .none-text{ font-size:12.5px; color:var(--text-dim); font-style:italic; }

  .submat-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .sub-chip{
    font-size:11.5px;
    background:rgba(138,106,60,0.12);
    color:var(--text-dim);
    border:1px dashed rgba(138,106,60,0.4);
    padding:4px 10px;
    border-radius:7px;
    font-weight:600;
  }

  .command-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .command-chip{
    font-size:13px;
    background:linear-gradient(135deg, #1f8a8c, #156668);
    color:#eafffe;
    border:1.5px solid #2bb5b8;
    padding:6px 14px;
    border-radius:8px;
    font-weight:800;
    letter-spacing:0.3px;
    box-shadow:0 2px 6px rgba(31,138,140,0.35);
  }

  .tag-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag-pill{
    font-size:11px;
    background:rgba(23,63,82,0.1);
    color:var(--sea);
    border:1px solid rgba(23,63,82,0.25);
    padding:3px 9px;
    border-radius:999px;
    font-weight:600;
  }

  .usedin-list{ display:flex; flex-direction:column; gap:8px; }
  .usedin-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.45);
    border:1px solid rgba(138,106,60,0.3);
    border-left:4px solid var(--gold);
    border-radius:10px;
    padding:9px 12px;
    cursor:pointer;
  }
  .usedin-item:active{ background:rgba(255,255,255,0.75); }
  .usedin-text{ flex:1; min-width:0; }
  .usedin-name-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .usedin-name{ font-size:13px; font-weight:700; }
  .usedin-via{ font-size:11px; color:var(--text-dim); margin-top:2px; }
  .arrow-right{ color:var(--text-dim); font-size:13px; }

  .usedin-grade-tag{
    font-size:9px;
    font-weight:700;
    padding:2px 7px;
    border-radius:5px;
    letter-spacing:0.2px;
    white-space:nowrap;
    flex:none;
    background:var(--sea);
    color:var(--gold-bright);
  }
  /* 등급별 역추적 아이템 좌측 보더 + 배지 색상 (카드 색상 체계와 동일) */
  .usedin-item.grade-anhun{ border-left-color:#8a99a3; }
  .usedin-item.grade-teukbyul{ border-left-color:#d98c2e; }
  .usedin-item.grade-huhn{ border-left-color:#6fa46b; }
  .usedin-item.grade-huigwi{ border-left-color:#a652a3; }
  .usedin-item.grade-rare{ border-left-color:#c0507a; }
  .usedin-item.grade-change{ border-left-color:#0e9488; }
  .usedin-item.grade-legend{ border-left-color:#e74c3c; }
  .usedin-item.grade-hidden{ border-left-color:#2bb5b8; }
  .usedin-item.grade-distortion{ border-left-color:#9b2fc9; }
  .usedin-item.grade-limited{ border-left-color:#d6336c; }
  .usedin-item.grade-transcend{ border-left-color:#4c4fd6; }
  .usedin-item.grade-immortal{ border-left-color:#b8860b; }
  .usedin-item.grade-eternal{ border-left-color:#0d9276; }

  .usedin-grade-tag.grade-anhun{ background:#3f4d56; color:#dde4e8; }
  .usedin-grade-tag.grade-teukbyul{ background:#7a4a14; color:#ffd9a0; }
  .usedin-grade-tag.grade-huhn{ background:#3a5a38; color:#d6f0d2; }
  .usedin-grade-tag.grade-huigwi{ background:#5e1f5c; color:#f0c4ee; }
  .usedin-grade-tag.grade-rare{ background:#6e2c45; color:#f5cbdb; }
  .usedin-grade-tag.grade-change{ background:#0b6b62; color:#d2fff5; }
  .usedin-grade-tag.grade-legend{ background:#7a1f15; color:#ffcfc7; }
  .usedin-grade-tag.grade-hidden{ background:#114e4f; color:#aef0ee; }
  .usedin-grade-tag.grade-distortion{ background:linear-gradient(135deg,#6b21a8,#c026a3); color:#fbe8ff; }
  .usedin-grade-tag.grade-limited{ background:linear-gradient(135deg,#a3174f,#e8487a); color:#ffe4ee; }
  .usedin-grade-tag.grade-transcend{ background:linear-gradient(135deg,#2e2f8c,#6366f1); color:#e8e9ff; }
  .usedin-grade-tag.grade-immortal{ background:linear-gradient(135deg,#8a5a00,#d4a017); color:#fff6dd; }
  .usedin-grade-tag.grade-eternal{ background:linear-gradient(135deg,#04604a,#10b981,#d4a017); color:#eafff6; }

  .update-note{
    text-align:right;
    font-size:10.5px;
    color:var(--text-dim);
    opacity:0.7;

<script>
// ===== 원랜디 도감 앱 로직 =====

// --- 한글 초성 추출 ---
const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function getChosung(text) {
  let result = '';
  for (const ch of text) {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code >= 0 && code <= 11171) {
      const choIdx = Math.floor(code / (21 * 28));
      result += CHOSUNG[choIdx];
    } else {
      result += ch;
    }
  }
  return result;
}

function normalize(str) {
  return str.toLowerCase().replace(/\s+/g, '');
}

// --- 등급별 색상/우선순위 ---
const GRADE_STYLE = {
  '안흔함': { cls: 'grade-anhun', order: 1 },
  '흔함':   { cls: 'grade-huhn',  order: 2 },
  '특별함': { cls: 'grade-teukbyul', order: 3 },
  '희귀함': { cls: 'grade-huigwi', order: 4 },
  '레어':   { cls: 'grade-rare', order: 5 },
  '변화된': { cls: 'grade-change', order: 5.5 },
  '전설적인': { cls: 'grade-legend', order: 6 },
  '히든조합': { cls: 'grade-hidden', order: 7 },
  '왜곡됨': { cls: 'grade-distortion', order: 8 },
  '제한됨': { cls: 'grade-limited', order: 9 },
  '초월함': { cls: 'grade-transcend', order: 10 },
  '불멸의': { cls: 'grade-immortal', order: 11 },
  '영원한': { cls: 'grade-eternal', order: 12 },
};
function gradeClass(grade) {
  return (GRADE_STYLE[grade] && GRADE_STYLE[grade].cls) || 'grade-default';
}

// --- 데이터 인덱싱 ---
const byId = {};
CHARACTER_DATA.forEach(c => { byId[c.id] = c; });

// 이름 -> 캐릭터 id 매핑 (재료 문자열이 캐릭터 이름과 일치하는 경우 역추적용)
const nameToId = {};
CHARACTER_DATA.forEach(c => { nameToId[c.name] = c.id; });

// 각 캐릭터별로 "어디에 쓰이는지" 역인덱스 구성
const usedInIndex = {}; // materialName -> [{id, name, via: '다른재료', grade}]
CHARACTER_DATA.forEach(c => {
  (c.materials || []).forEach(matName => {
    if (!usedInIndex[matName]) usedInIndex[matName] = [];
    const others = (c.materials || []).filter(m => m !== matName);
    usedInIndex[matName].push({
      resultId: c.id,
      resultName: c.name,
      resultGrade: c.grade,
      via: others.length ? others.join(' + ') : null
    });
  });
});

// --- 등급 필터 칩 ---
let activeGrade = null; // null = 전체

function renderGradeFilter() {
  const grades = [...new Set(CHARACTER_DATA.map(c => c.grade))]
    .sort((a, b) => ((GRADE_STYLE[a]?.order)||99) - ((GRADE_STYLE[b]?.order)||99));
  const wrap = document.getElementById('gradeFilter');
  wrap.innerHTML = `<span class="grade-chip ${activeGrade===null?'active':''}" data-grade="">전체</span>` +
    grades.map(g => `<span class="grade-chip ${gradeClass(g)} ${activeGrade===g?'active':''}" data-grade="${escapeHtml(g)}">${escapeHtml(g)}</span>`).join('');
  wrap.querySelectorAll('.grade-chip').forEach(el => {
    el.addEventListener('click', () => {
      activeGrade = el.dataset.grade || null;
      renderGradeFilter();
      runSearch();
    });
  });
}

// --- 태그 전체 수집 (힌트칩용, 상위 6개) ---
function renderTagHints() {
  const tagCount = {};
  CHARACTER_DATA.forEach(c => (c.tags||[]).forEach(t => { tagCount[t] = (tagCount[t]||0)+1; }));
  const sorted = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const wrap = document.getElementById('tagHints');
  wrap.innerHTML = sorted.map(([tag]) => `<span class="hint-chip" data-tag="${escapeHtml(tag)}">#${escapeHtml(tag)}</span>`).join('');
  wrap.querySelectorAll('.hint-chip').forEach(el => {
    el.addEventListener('click', () => {
      const input = document.getElementById('searchInput');
      input.value = '#' + el.dataset.tag;
      runSearch();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// --- 검색 ---
function matchCharacter(c, query) {
  if (!query) return true;

  if (query.startsWith('#')) {
    const tagQ = normalize(query.slice(1));
    if (!tagQ) return true;
    return (c.tags || []).some(t => normalize(t).includes(tagQ));
  }

  const q = normalize(query);
  const nameNorm = normalize(c.name);

  // 일반 텍스트 포함 검색
  if (nameNorm.includes(q)) return true;

  // 초성 검색: 검색어 자체를 초성화해서 이름의 초성열에 포함되는지 비교
  // (완성형 한글이 섞여도 getChosung은 그대로 두므로, 순수 초성/혼합 모두 안전)
  const qChosung = normalize(getChosung(query));
  const nameChosung = normalize(getChosung(c.name));
  if (qChosung && nameChosung.includes(qChosung)) return true;

  // 태그/재료 텍스트도 보조 검색 대상
  if ((c.tags||[]).some(t => normalize(t).includes(q))) return true;
  if ((c.materials||[]).some(m => normalize(m).includes(q))) return true;

  return false;
}

function runSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  let filtered = CHARACTER_DATA.filter(c => matchCharacter(c, query));
  if (activeGrade) {
    filtered = filtered.filter(c => c.grade === activeGrade);
  }

  document.getElementById('countBadge').textContent = filtered.length + '종';

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(c => cardTemplate(c)).join('');

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}

function levelText(level) {
  if (!level || level[0] === '?' || level[0] === null) return 'Lv. 범위없음';
  return `Lv. ${level[0]}-${level[1]}`;
}

function cardTemplate(c) {
  const matText = (c.materials && c.materials.length) ? c.materials.join(' + ') : '단독 획득';
  return `
    <div class="card ${gradeClass(c.grade)}" data-id="${c.id}">
      <div class="card-top">
        <div class="card-name">${escapeHtml(c.name)}</div>
        <span class="grade-tag">${escapeHtml(c.grade)}</span>
      </div>
      <div class="card-materials">${escapeHtml(matText)}</div>
      <div class="card-bottom">
        <span class="card-level">${levelText(c.level)}</span>
        <span class="card-tagcount">${(c.tags||[]).slice(0,2).map(t=>'#'+t).join(' ')}</span>
      </div>
    </div>
  `;
}

// --- 모달 (상세 + 역추적) ---
function openModal(id) {
  const c = byId[id];
  if (!c) return;

  document.getElementById('modalName').textContent = c.name;
  document.getElementById('modalGrade').textContent = c.grade;
  document.getElementById('modalGrade').className = 'modal-grade ' + gradeClass(c.grade);
  document.getElementById('modalLevel').textContent = levelText(c.level);
  document.getElementById('updateNote').textContent = `수정일 ${c.updated}`;

  // 조합 재료
  const recipeRow = document.getElementById('recipeRow');
  if (!c.materials || c.materials.length === 0) {
    recipeRow.innerHTML = `<span class="none-text">조합 재료 정보 없음 (단독 획득)</span>`;
  } else {
    const chips = c.materials.map((matName) => {
      const matId = nameToId[matName];
      const cls = matId ? 'mini-chip' : 'mini-chip no-link';
      const attr = matId ? `data-id="${matId}"` : '';
      return `<span class="${cls}" ${attr}>${escapeHtml(matName)}</span>`;
    });
    recipeRow.innerHTML = chips.join('<span class="plus-sep">+</span>');
    recipeRow.querySelectorAll('.mini-chip[data-id]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(el.dataset.id);
      });
    });
  }

  // 하위재료 (재료를 한 번 더 분해한 기본단위 환산)
  const subSection = document.getElementById('subMatSection');
  const subRow = document.getElementById('subMatRow');
  if (c.subMaterials && c.subMaterials.length > 0) {
    subSection.style.display = '';
    subRow.innerHTML = c.subMaterials.map(s => `<span class="sub-chip">${escapeHtml(s)}</span>`).join('');
  } else {
    subSection.style.display = 'none';
  }

  // 조합 명령어 (재료를 다 모은 뒤 타이핑해야 하는 키워드, 히든조합 전용)
  const cmdSection = document.getElementById('commandSection');
  const cmdRow = document.getElementById('commandRow');
  if (c.command && c.command.name) {
    cmdSection.style.display = '';
    cmdRow.innerHTML = `<span class="command-chip">${escapeHtml(c.command.name)}</span>`;
  } else {
    cmdSection.style.display = 'none';
  }

  // 태그
  const tagRow = document.getElementById('tagRow');
  tagRow.innerHTML = (c.tags||[]).map(t => `<span class="tag-pill">#${escapeHtml(t)}</span>`).join('') || `<span class="none-text">태그 없음</span>`;

  // 역추적: 이 캐릭터가 재료로 쓰이는 조합들
  const usedinList = document.getElementById('usedinList');
  const usages = (usedInIndex[c.name] || []).slice().sort((a, b) => {
    const oa = (GRADE_STYLE[a.resultGrade] && GRADE_STYLE[a.resultGrade].order) || 0;
    const ob = (GRADE_STYLE[b.resultGrade] && GRADE_STYLE[b.resultGrade].order) || 0;
    return ob - oa; // 상위 등급이 위로
  });
  if (usages.length === 0) {
    usedinList.innerHTML = `<span class="none-text">다른 조합의 재료로 사용되지 않습니다</span>`;
  } else {
    usedinList.innerHTML = usages.map(u => {
      const gCls = gradeClass(u.resultGrade);
      return `
        <div class="usedin-item ${gCls}" data-id="${u.resultId}">
          <span class="usedin-text">
            <div class="usedin-name-row">
              <span class="usedin-grade-tag ${gCls}">${escapeHtml(u.resultGrade || '')}</span>
              <span class="usedin-name">${escapeHtml(u.resultName)}</span>
            </div>
            ${u.via ? `<div class="usedin-via">+ ${escapeHtml(u.via)}</div>` : ''}
          </span>
          <span class="arrow-right">▸</span>
        </div>
      `;
    }).join('');
    usedinList.querySelectorAll('.usedin-item').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.id));
    });
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') closeModal();
});

// --- 검색 입력 바인딩 ---
let searchDebounce;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 80);
});

// --- PWA 설치 유도 토스트 ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const seen = localStorage.getItem('installDismissed');
  if (!seen) {
    document.getElementById('installToast').classList.add('show');
  }
});

document.getElementById('installBtn').addEventListener('click', async () => {
  document.getElementById('installToast').classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

document.getElementById('dismissInstall').addEventListener('click', () => {
  document.getElementById('installToast').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
});

// --- 초기 렌더 ---
renderGradeFilter();
renderTagHints();
runSearch();

// --- PWA: 서비스워커 등록 ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .catch((err) => console.error('Service worker 등록 실패:', err));
  });
}

</script>
